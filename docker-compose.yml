# ═══════════════════════════════════════════════════════════════════════════
# Fraud Detection System - Docker Compose
# ═══════════════════════════════════════════════════════════════════════════
# Local development environment with FastAPI + optional monitoring
# ═══════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Fraud Detection API (FastAPI)
  # ─────────────────────────────────────────────────────────────────────────
  fraud-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-detection-api
    ports:
      - "8000:8000"
    volumes:
      # Mount trained models (required!)
      - ./trained_models:/app/trained_models:ro
      # Mount logs for debugging
      - ./logs:/app/logs
      # Mount results (optional)
      - ./results:/app/results
    environment:
      # API Configuration
      - MODEL_PATH=/app/trained_models
      - LOG_LEVEL=INFO
      - WORKERS=2
      
      # Optional: Override in .env file
      - API_HOST=0.0.0.0
      - API_PORT=8000
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Restart policy
    restart: unless-stopped
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    
    networks:
      - fraud-network

  # ─────────────────────────────────────────────────────────────────────────
  # Optional: Nginx Reverse Proxy (for production)
  # ─────────────────────────────────────────────────────────────────────────
  # Uncomment if you want SSL termination or load balancing
  # nginx:
  #   image: nginx:alpine
  #   container_name: fraud-nginx
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - fraud-api
  #   networks:
  #     - fraud-network

networks:
  fraud-network:
    driver: bridge

# ═══════════════════════════════════════════════════════════════════════════
# USAGE
# ═══════════════════════════════════════════════════════════════════════════
#
# Build and start:
#   docker-compose up --build
#
# Start in background:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f fraud-api
#
# Stop:
#   docker-compose down
#
# Rebuild:
#   docker-compose up --build --force-recreate
#
# ═══════════════════════════════════════════════════════════════════════════
# IMPORTANT: TRAIN MODELS FIRST
# ═══════════════════════════════════════════════════════════════════════════
#
# Before running docker-compose, ensure trained models exist:
#
#   python scripts/train_models.py
#
# This will create:
#   trained_models/feature_scaler.pkl
#   trained_models/stacking_ensemble.pkl
#   ... (other models)
#
# ═══════════════════════════════════════════════════════════════════════════
