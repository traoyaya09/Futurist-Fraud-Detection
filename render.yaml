# ==========================================
# Render.com Deployment Configuration
# Recommendation Service
# ==========================================

services:
  # Main Recommendation Service
  - type: web
    name: futurist-recommendation-service
    env: docker
    region: oregon # Change to your preferred region
    plan: starter # Options: starter, standard, pro
    
    # Docker configuration - IMPORTANT: Path relative to repo root
    dockerfilePath: ./recommendation_service/Dockerfile
    dockerContext: ./recommendation_service
    
    # Environment variables
    envVars:
      # Application settings
      - key: ENVIRONMENT
        value: production
      
      - key: APP_NAME
        value: Futurist Recommendation Service
      
      - key: APP_VERSION
        value: 2.1.0
      
      - key: HOST
        value: 0.0.0.0
      
      - key: PORT
        value: 8000
      
      - key: DEBUG
        value: false
      
      - key: LOG_LEVEL
        value: INFO
      
      - key: WORKERS
        value: 2
      
      # MongoDB connection (from Render dashboard)
      - key: MONGO_URI
        sync: false # Set this in Render dashboard
      
      - key: MONGO_DB_NAME
        value: futurist_ecommerce
      
      # Rate limiting
      - key: RATE_LIMIT_ENABLED
        value: true
      
      - key: RATE_LIMIT_PER_MINUTE
        value: 100
      
      # CORS settings
      - key: CORS_ORIGINS
        value: "*" # Update with your frontend domains
      
      # Model paths
      - key: COLLABORATIVE_MODEL_PATH
        value: models/hybrid_model.joblib
      
      - key: TEXT_MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      
      - key: IMAGE_MODEL_NAME
        value: ViT-B/32
      
      # Normalization
      - key: DEFAULT_NORMALIZE
        value: true
    
    # Health check
    healthCheckPath: /health
    
    # Auto-deploy
    autoDeploy: true
