# ═══════════════════════════════════════════════════════════════════════════
# Fraud Detection API - Render.com Blueprint
# ═══════════════════════════════════════════════════════════════════════════
# Production deployment configuration for Render.com
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI Web Service
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: fraud-detection-api
    runtime: docker
    plan: starter  # or: free, starter, standard, pro (adjust based on needs)
    region: oregon  # or: frankfurt, singapore, ohio (choose closest to your users)
    
    # Docker configuration
    dockerfilePath: ./Dockerfile
    dockerContext: ./ml-layer/fraud-detection-system
    
    # Health check
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      - key: MODEL_PATH
        value: /app/trained_models
      
      - key: LOG_LEVEL
        value: INFO
      
      - key: WORKERS
        value: 2
      
      - key: PYTHON_VERSION
        value: 3.10
      
      # Optional: Add secrets from Render dashboard
      # - key: API_KEY
      #   sync: false  # Set manually in Render dashboard
    
    # Auto-deploy
    autoDeploy: true  # Auto-deploy on git push
    
    # Scaling (adjust based on traffic)
    scaling:
      minInstances: 1
      maxInstances: 3
      targetCPUPercent: 70
    
    # Build command (runs before starting)
    buildCommand: |
      echo "Installing dependencies..."
      pip install -r requirements.txt
      echo "Checking for trained models..."
      if [ ! -f "trained_models/feature_scaler.pkl" ]; then
        echo "ERROR: Trained models not found!"
        echo "Please run: python scripts/train_models.py"
        echo "Then commit trained_models/ to git or use persistent disk"
        exit 1
      fi
      echo "Build complete!"
    
    # Start command
    startCommand: uvicorn fraud_detection_service:app --host 0.0.0.0 --port $PORT --workers 2
    
    # Persistent disk for models (optional but recommended)
    # disk:
    #   name: fraud-models
    #   mountPath: /app/trained_models
    #   sizeGB: 1

# ═══════════════════════════════════════════════════════════════════════════
# DEPLOYMENT INSTRUCTIONS
# ═══════════════════════════════════════════════════════════════════════════
#
# Option 1: Deploy via Render Dashboard
# ──────────────────────────────────────
# 1. Push this file to your GitHub repo
# 2. Go to: https://dashboard.render.com
# 3. Click "New" → "Blueprint"
# 4. Connect your GitHub repo
# 5. Render will auto-detect render.yaml
# 6. Click "Apply" to deploy
#
# Option 2: Deploy via Render CLI
# ────────────────────────────────
# 1. Install Render CLI:
#    curl -fsSL https://render.com/install-cli.sh | sh
#
# 2. Login:
#    render login
#
# 3. Deploy:
#    render blueprint deploy
#
# ═══════════════════════════════════════════════════════════════════════════
# IMPORTANT: TRAINED MODELS
# ═══════════════════════════════════════════════════════════════════════════
#
# Render's ephemeral filesystem means models will be lost on redeploy.
#
# Solutions:
#
# 1. Commit models to Git (if < 100MB):
#    git add trained_models/*.pkl
#    git commit -m "Add trained models"
#    git push
#
# 2. Use Render Disk (persistent storage):
#    - Uncomment "disk:" section above
#    - Upload models via Render dashboard
#
# 3. Train on deployment (slow, not recommended):
#    buildCommand: |
#      pip install -r requirements.txt
#      python scripts/train_models.py
#
# ═══════════════════════════════════════════════════════════════════════════
# PRICING (as of 2024)
# ═══════════════════════════════════════════════════════════════════════════
#
# Free Tier:
#   - 512 MB RAM, 0.1 CPU
#   - Spins down after 15 min inactivity
#   - Good for: Testing, demos
#
# Starter ($7/month):
#   - 512 MB RAM, 0.5 CPU
#   - Always on
#   - Good for: Low-traffic production
#
# Standard ($25/month):
#   - 2 GB RAM, 1 CPU
#   - Auto-scaling
#   - Good for: Production with moderate traffic
#
# Pro ($85/month):
#   - 4 GB RAM, 2 CPU
#   - Advanced scaling
#   - Good for: High-traffic production
#
# Persistent Disk: $0.25/GB/month
#
# ═══════════════════════════════════════════════════════════════════════════
# MONITORING & LOGS
# ═══════════════════════════════════════════════════════════════════════════
#
# View logs:
#   - Render Dashboard → Services → fraud-detection-api → Logs
#   - Or: render logs fraud-detection-api
#
# Metrics:
#   - Render Dashboard → Services → fraud-detection-api → Metrics
#   - CPU, Memory, Request rate, Response time
#
# Alerts (paid plans):
#   - Set up alerts for high CPU, memory, or error rate
#
# ═══════════════════════════════════════════════════════════════════════════
# CUSTOM DOMAIN (Optional)
# ═══════════════════════════════════════════════════════════════════════════
#
# 1. Go to: Service Settings → Custom Domain
# 2. Add your domain: api.yourdomain.com
# 3. Update DNS:
#    - Type: CNAME
#    - Name: api
#    - Value: fraud-detection-api.onrender.com
# 4. Render auto-provisions SSL certificate (Let's Encrypt)
#
# ═══════════════════════════════════════════════════════════════════════════
# ENVIRONMENT VARIABLES
# ═══════════════════════════════════════════════════════════════════════════
#
# Set in Render Dashboard:
# - Environment → Add Environment Variable
#
# Recommended:
# - API_KEY: Your secret API key
# - SENTRY_DSN: Error tracking (optional)
# - LOG_LEVEL: DEBUG, INFO, WARNING, ERROR
#
